<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AuraChat — Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ══ VIVID BACKGROUND — glass needs this to look transparent ══ */
    .bg-image {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      /* Slightly dim but keep color vivid */
      filter: brightness(0.6) saturate(1.5);
      z-index: 0;
    }

    /* Colored radial tints layered on top of image */
    .bg-tints {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 15% 25%, rgba(0, 60, 200, 0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 70% at 85% 75%, rgba(80, 0, 180, 0.5) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 55% 5%,  rgba(0, 140, 220, 0.4) 0%, transparent 55%);
    }

    /* Very thin dark film — enough for readability, not enough to kill bg */
    .bg-film {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: rgba(2, 8, 30, 0.38);
    }

    .scanlines {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: repeating-linear-gradient(transparent, transparent 2px, rgba(0,200,255,0.015) 3px);
    }

    .grid-bg {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,200,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.05) 1px, transparent 1px);
      background-size: 52px 52px;
      animation: gridPan 22s linear infinite;
    }

    .corner {
      position: fixed; z-index: 20; opacity: 0.55;
      width: 44px; height: 44px;
    }
    .corner-tl { top:20px; left:20px;   border-top: 2px solid rgba(255,255,255,0.55); border-left:  2px solid rgba(255,255,255,0.55); border-radius:4px 0 0 0; }
    .corner-tr { top:20px; right:20px;  border-top: 2px solid rgba(255,255,255,0.55); border-right: 2px solid rgba(255,255,255,0.55); border-radius:0 4px 0 0; }
    .corner-bl { bottom:20px; left:20px;  border-bottom:2px solid rgba(255,255,255,0.55); border-left:  2px solid rgba(255,255,255,0.55); border-radius:0 0 0 4px; }
    .corner-br { bottom:20px; right:20px; border-bottom:2px solid rgba(255,255,255,0.55); border-right: 2px solid rgba(255,255,255,0.55); border-radius:0 0 4px 0; }

    /* ══ GLASS PANEL ══
       Secret: background must be very low opacity.
       backdrop-filter does the frosting work.
       border + inset shadows do the metallic rim.  */
    .glass-panel {
      position: relative;
      z-index: 10;
      padding: 56px 72px 52px;
      border-radius: 28px;
      min-width: 480px;
      text-align: center;

      /* Almost-transparent tinted base */
      background: rgba(8, 20, 70, 0.15);

      /* Frosted glass */
      backdrop-filter: blur(22px) saturate(200%) brightness(1.08);
      -webkit-backdrop-filter: blur(22px) saturate(200%) brightness(1.08);

      /* Glassy borders & depth */
      border: 1px solid rgba(255, 255, 255, 0.30);
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.12),
        0 20px 70px rgba(0, 0, 0, 0.55),
        0 0 50px rgba(30, 80, 255, 0.15),
        inset 0 1.5px 0 rgba(255, 255, 255, 0.6),   /* top rim highlight */
        inset 0 -1px  0 rgba(0,  0,  0,  0.25),      /* bottom shadow */
        inset 1px  0  0 rgba(255,255,255,0.15),
        inset -1px 0  0 rgba(255,255,255,0.10);

      overflow: hidden;
    }

    /* Top specular line — single brightest point */
    .glass-panel::before {
      content: "";
      position: absolute; top: 0; left: 8%; right: 8%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.9) 25%,
        rgba(210,240,255,1)   50%,
        rgba(255,255,255,0.9) 75%,
        transparent 100%
      );
    }

    /* Slow light-sweep reflection */
    .glass-panel::after {
      content: "";
      position: absolute; top: 0; left: -130%; width: 65%; height: 100%;
      background: linear-gradient(108deg,
        transparent 35%,
        rgba(255,255,255,0.06) 48%,
        rgba(255,255,255,0.13) 50%,
        rgba(255,255,255,0.06) 52%,
        transparent 65%
      );
      animation: shineSwipe 5.5s ease-in-out infinite;
      pointer-events: none;
    }

    .logo-text {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      letter-spacing: 18px;
      color: #fff;
      text-shadow:
        0 0 8px rgba(120,210,255,0.9),
        0 0 28px rgba(80,180,255,0.55),
        0 0 60px rgba(40,130,255,0.3);
      animation: flicker 4s infinite;
      position: relative; z-index: 1;
    }

    .logo-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      letter-spacing: 7px;
      color: rgba(200, 230, 255, 0.8);
      text-transform: uppercase;
      margin-top: 10px;
      opacity: 0;
      animation: fadeSlideUp 0.8s 0.5s forwards;
      position: relative; z-index: 1;
    }

    .glass-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      margin: 32px 0;
      position: relative; z-index: 1;
    }

    .bar-wrap {
      width: 100%; opacity: 0;
      animation: fadeSlideUp 0.6s 0.8s forwards;
      position: relative; z-index: 1;
    }

    .bar-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem; letter-spacing: 4px;
      color: rgba(160, 210, 255, 0.75);
      text-align: left; margin-bottom: 10px; text-transform: uppercase;
    }

    .bar-track {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px; overflow: hidden;
    }

    .bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, rgba(0,180,255,0.9), rgba(120,230,255,1), #fff);
      border-radius: 10px;
      animation: loadBar 2.6s cubic-bezier(0.4,0,0.2,1) forwards;
      box-shadow: 0 0 14px rgba(120,230,255,0.75);
    }

    .status-line {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: rgba(160, 210, 255, 0.85);
      letter-spacing: 1px;
      margin-top: 16px; text-align: left;
    }
    .status-line span { display:block; opacity:0; padding:2px 0; }
    .status-line span::before { content:"▸ "; color:rgba(120,230,255,0.9); }
    .status-line span:nth-child(1) { animation:fadeIn 0.4s 0.9s forwards; }
    .status-line span:nth-child(2) { animation:fadeIn 0.4s 1.4s forwards; }
    .status-line span:nth-child(3) { animation:fadeIn 0.4s 1.9s forwards; }
    .status-line span:nth-child(4) { animation:fadeIn 0.4s 2.3s forwards; }

    @keyframes flicker { 0%,92%,100%{opacity:1} 93%{opacity:0.8} 96%{opacity:0.5} }
    @keyframes loadBar { to{width:100%} }
    @keyframes fadeSlideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { to{opacity:1} }
    @keyframes gridPan { from{background-position:0 0,0 0} to{background-position:0 52px,52px 0} }
    @keyframes shineSwipe { 0%{left:-130%} 45%,100%{left:160%} }
  </style>
</head>
<body>

  <img class="bg-image" src="img/miku.jpg" alt="" />
  <div class="bg-tints"></div>
  <div class="bg-film"></div>
  <div class="scanlines"></div>
  <div class="grid-bg"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="glass-panel">
    <div class="logo-text">AURA</div>
    <div class="logo-sub">Neural Chat System v2.0</div>
    <div class="glass-divider"></div>
    <div class="bar-wrap">
      <div class="bar-label">System Boot</div>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="status-line">
        <span>Initializing core modules...</span>
        <span>Establishing secure connection...</span>
        <span>Loading language protocols...</span>
        <span>System ready.</span>
      </div>
    </div>
  </div>

  <script>
    setTimeout(() => { window.location.href = 'profile.html'; }, 2800);
  </script>
</body>
</html>
